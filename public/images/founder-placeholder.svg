  <circle cx="360" cy="265" r="12" fill="#ffffff" />
  <circle cx="440" cy="265" r="12" fill="#ffffff" />
  <rect x="242" y="124" width="316" height="140" rx="36" fill="url(#accent)" />
  <text x="400" y="186" text-anchor="middle" font-family="Inter, sans-serif" font-size="42" fill="#1f2937">Founder</text>
  <text x="400" y="236" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" fill="#1f2937" opacity="0.85">Photo Sample</text>
